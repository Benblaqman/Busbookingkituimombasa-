<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSA Bus Booking - Kitui to Mombasa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --primary: #e30613;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd70cbf6d6?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }
        
        header {
            background: rgba(227, 6, 19, 0.95);
            color: white;
            padding: 20px 15px;
            text-align: center;
            border-radius: 12px 12px 0 0;
            backdrop-filter: blur(8px);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        select, input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        label {
            display: block;
            margin: 8px 0 4px;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 12px 0;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #c0040f;
            transform: translateY(-2px);
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .fare {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            padding: 15px 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
        }
        
        .modal-content {
            background: white;
            padding: 30px 20px;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .booking-code {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 3px;
            margin: 15px 0;
        }
        
        .status {
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
        }
        
        /* Responsive Improvements */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .card {
                padding: 20px 18px;
                margin-bottom: 15px;
            }
            header {
                padding: 18px 12px;
            }
            button {
                padding: 15px;
                font-size: 17px;
            }
        }
        
        .header-subtitle {
            opacity: 0.9;
            margin: 5px 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MMSA Bus Services</h1>
            <p class="header-subtitle">Reliable • Comfortable • Modern Coaches</p>
        </header>

        <!-- Step 1: Selection -->
        <div id="step1" class="step active card">
            <h2>Step 1: Select Your Route</h2>
            <label>From</label>
            <select id="from">
                <option value="Kitui">Kitui</option>
            </select>
            
            <label>To</label>
            <select id="to">
                <option value="Mombasa">Mombasa</option>
            </select>
            
            <div class="fare" id="fareDisplay">KSh 1,500</div>
            <button onclick="nextStep(2)">Continue to Passenger Details</button>
        </div>

        <!-- Step 2: Details -->
        <div id="step2" class="step card">
            <h2>Step 2: Passenger Details</h2>
            <form id="bookingForm">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
                
                <label>Phone Number</label>
                <input type="tel" id="phone" required placeholder="07XXXXXXXX" maxlength="10">
                
                <label>ID Number</label>
                <input type="text" id="id" required placeholder="12345678">
                
                <label>Travel Date</label>
                <input type="date" id="date" required>
                
                <button type="button" onclick="bookSeat()">Book Seat</button>
            </form>
            <button onclick="nextStep(1)" style="background:#666;">← Back</button>
        </div>

        <!-- Confirmation Modal -->
        <div id="confirmModal" class="modal">
            <div class="modal-content">
                <h2>Confirm Your Booking</h2>
                <p id="confirmDetails" style="text-align:left; line-height:1.6;"></p>
                <button onclick="confirmBooking()" style="background:#28a745;">Confirm & Send</button>
                <button onclick="closeModal()" style="background:#666;">Cancel</button>
            </div>
        </div>

        <!-- Step 4: Payment -->
        <div id="step4" class="step card">
            <h2>Step 3: Complete M-Pesa Payment</h2>
            <div id="bookingInfo" style="text-align:center; margin:20px 0;"></div>
            
            <div style="background:#f0f8ff; padding:20px; border-radius:12px; margin:20px 0; border:1px solid #b3d9ff;">
                <p><strong>Paybill:</strong> <span id="paybill">123456</span></p>
                <p><strong>Account:</strong> <span id="refCode" class="booking-code"></span></p>
                <p><strong>Amount:</strong> KSh <span id="payAmount">1500</span></p>
            </div>
            
            <button onclick="simulateMpesa()">💳 Pay with M-Pesa App</button>
            <button onclick="copyPayment()" style="background:#17a2b8;">📋 Copy Payment Details</button>
            <button onclick="finishBooking()" style="background:#28a745;">✅ I've Paid</button>
            
            <div id="saveStatus" class="status"></div>
        </div>
    </div>

    <script>
        let currentBooking = {};
        const FARE = 1500;
        const SHEETDB_URL = "https://sheetdb.io/api/v1/ryq6j7fbhinf0";
        
        function updateFare() {
            document.getElementById('fareDisplay').textContent = `KSh ${FARE}`;
        }
        
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
        }
        
        function bookSeat() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const idNum = document.getElementById('id').value.trim();
            const date = document.getElementById('date').value;
            
            if (!name || !phone || !idNum || !date) {
                alert("Please fill all fields");
                return;
            }
            
            currentBooking = {
                name,
                phone,
                id: idNum,
                travel_date: date,
                route: "Kitui → Mombasa",
                fare: FARE,
                status: "Pending",
                booking_code: "MMSA-" + Math.floor(1000 + Math.random() * 9000),
                timestamp: new Date().toISOString()
            };
            
            const details = `
                <strong>Name:</strong> ${name}<br>
                <strong>Phone:</strong> ${phone}<br>
                <strong>ID:</strong> ${idNum}<br>
                <strong>Date:</strong> ${date}<br>
                <strong>Route:</strong> Kitui → Mombasa<br>
                <strong>Amount:</strong> KSh ${FARE}
            `;
            document.getElementById('confirmDetails').innerHTML = details;
            document.getElementById('confirmModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }
        
        async function confirmBooking() {
            closeModal();
            
            const statusEl = document.getElementById('saveStatus');
            statusEl.textContent = "Saving to SheetDB...";
            statusEl.style.background = "#fff3cd";
            statusEl.style.color = "#856404";
            
            try {
                const response = await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: currentBooking })
                });
                
                if (response.ok) {
                    statusEl.textContent = "✅ Booking saved successfully!";
                    statusEl.style.background = "#d4edda";
                    statusEl.style.color = "#155724";
                } else {
                    throw new Error("Failed to save");
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = "⚠️ Save failed. Try again.";
                statusEl.style.background = "#f8d7da";
                statusEl.style.color = "#721c24";
            }
            
            document.getElementById('bookingInfo').innerHTML = `
                <p><strong>Booking Code:</strong> <span class="booking-code">${currentBooking.booking_code}</span></p>
            `;
            document.getElementById('refCode').textContent = currentBooking.booking_code;
            document.getElementById('payAmount').textContent = currentBooking.fare;
            
            nextStep(4);
        }
        
        function simulateMpesa() {
            alert(`M-Pesa Prompt Sent!\n\nPhone: ${currentBooking.phone}\nAmount: KSh ${currentBooking.fare}\nRef: ${currentBooking.booking_code}`);
        }
        
        function copyPayment() {
            const text = `Paybill: 123456\nAccount: ${currentBooking.booking_code}\nAmount: KSh ${currentBooking.fare}`;
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ Details copied! Open M-Pesa now.");
            });
        }
        
        function finishBooking() {
            alert(`🎉 Thank you!\n\nBooking Code: ${currentBooking.booking_code}\nSafe travels with MMSA!`);
            document.getElementById('bookingForm').reset();
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step1').classList.add('active');
            document.getElementById('saveStatus').innerHTML = '';
        }
        
        // Initialize
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            updateFare();
        };
    </script>
</body>
</html>
