<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSA Bus Booking - Kitui to Mombasa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --primary: #e30613;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 20px;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }
        
        button:hover {
            background: #c0040f;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .fare {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            text-align: center;
        }
        
        .success {
            color: #28a745;
            font-size: 48px;
        }
        
        .booking-code {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 22px;
            letter-spacing: 2px;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MMSA Bus Services</h1>
            <p>Kitui → Mombasa</p>
        </header>

        <!-- Step 1: Selection -->
        <div id="step1" class="step active card">
            <h2>Step 1: Select Your Route</h2>
            <label>From</label>
            <select id="from">
                <option value="Kitui">Kitui</option>
            </select>
            
            <label>To</label>
            <select id="to">
                <option value="Mombasa">Mombasa</option>
            </select>
            
            <div class="fare" id="fareDisplay">KSh 1,500</div>
            <button onclick="nextStep(2)">Continue to Details</button>
        </div>

        <!-- Step 2: Details -->
        <div id="step2" class="step card">
            <h2>Step 2: Passenger Details</h2>
            <form id="bookingForm">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
                
                <label>Phone Number</label>
                <input type="tel" id="phone" required placeholder="07XXXXXXXX" maxlength="10">
                
                <label>ID Number</label>
                <input type="text" id="id" required placeholder="12345678">
                
                <label>Travel Date</label>
                <input type="date" id="date" required>
                
                <button type="button" onclick="bookSeat()">Book Seat</button>
            </form>
            <button onclick="nextStep(1)" style="background:#666;">Back</button>
        </div>

        <!-- Confirmation Modal -->
        <div id="confirmModal" class="modal">
            <div class="modal-content">
                <h2>Confirm Booking</h2>
                <p id="confirmDetails"></p>
                <button onclick="confirmBooking()" style="background:#28a745;">Confirm & Send</button>
                <button onclick="closeModal()" style="background:#666;">Cancel</button>
            </div>
        </div>

        <!-- Step 4: Payment -->
        <div id="step4" class="step card">
            <h2>Complete Payment via M-Pesa</h2>
            <div id="bookingInfo" style="text-align:center; margin:20px 0;"></div>
            
            <div style="background:#f0f8ff; padding:20px; border-radius:8px; margin:20px 0;">
                <p><strong>Paybill / Till:</strong> <span id="paybill">123456</span></p>
                <p><strong>Account Reference:</strong> <span id="refCode" class="booking-code"></span></p>
                <p>Amount: KSh <span id="payAmount">1500</span></p>
            </div>
            
            <button onclick="simulateMpesa()">Pay with M-Pesa App</button>
            <button onclick="copyPayment()" style="background:#17a2b8;">Copy Details</button>
            <button onclick="finishBooking()" style="background:#28a745;">I've Paid</button>
            
            <div id="saveStatus" class="status"></div>
        </div>
    </div>

    <script>
        let currentBooking = {};
        const FARE = 1500;
        const SHEETDB_URL = "https://sheetdb.io/api/v1/ryq6j7fbhinf0";
        
        function updateFare() {
            document.getElementById('fareDisplay').textContent = `KSh ${FARE}`;
        }
        
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
        }
        
        function bookSeat() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const idNum = document.getElementById('id').value.trim();
            const date = document.getElementById('date').value;
            
            if (!name || !phone || !idNum || !date) {
                alert("Please fill all fields");
                return;
            }
            
            currentBooking = {
                name,
                phone,
                id: idNum,
                travel_date: date,
                route: "Kitui → Mombasa",
                fare: FARE,
                status: "Pending",
                booking_code: "MMSA-" + Math.floor(1000 + Math.random() * 9000),
                timestamp: new Date().toISOString()
            };
            
            const details = `
                Name: ${name}<br>
                Phone: ${phone}<br>
                ID: ${idNum}<br>
                Date: ${date}<br>
                Route: Kitui → Mombasa<br>
                Amount: KSh ${FARE}
            `;
            document.getElementById('confirmDetails').innerHTML = details;
            document.getElementById('confirmModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }
        
        async function confirmBooking() {
            closeModal();
            
            const statusEl = document.getElementById('saveStatus');
            statusEl.textContent = "Saving booking...";
            statusEl.style.background = "#fff3cd";
            statusEl.style.color = "#856404";
            
            try {
                const response = await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        data: currentBooking
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    statusEl.textContent = "✅ Saved successfully to SheetDB!";
                    statusEl.style.background = "#d4edda";
                    statusEl.style.color = "#155724";
                    console.log("SheetDB response:", result);
                } else {
                    throw new Error(result.message || "Failed to save");
                }
            } catch (error) {
                console.error("Save error:", error);
                statusEl.textContent = "⚠️ Failed to save. Please try again.";
                statusEl.style.background = "#f8d7da";
                statusEl.style.color = "#721c24";
            }
            
            // Show payment step
            document.getElementById('bookingInfo').innerHTML = `
                <p><strong>Booking Code:</strong> <span class="booking-code">${currentBooking.booking_code}</span></p>
            `;
            document.getElementById('refCode').textContent = currentBooking.booking_code;
            document.getElementById('payAmount').textContent = currentBooking.fare;
            
            nextStep(4);
        }
        
        function simulateMpesa() {
            alert(`✅ M-Pesa STK Push initiated!\n\nPhone: ${currentBooking.phone}\nAmount: KSh ${currentBooking.fare}\nReference: ${currentBooking.booking_code}`);
        }
        
        function copyPayment() {
            const text = `Paybill: 123456\nAccount: ${currentBooking.booking_code}\nAmount: KSh ${currentBooking.fare}\nName: ${currentBooking.name}`;
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ Payment details copied to clipboard!\n\nOpen M-Pesa → Lipa na M-Pesa → Pay Bill");
            });
        }
        
        function finishBooking() {
            alert(`🎉 Booking Confirmed!\n\nCode: ${currentBooking.booking_code}\nThank you for choosing MMSA Bus Services.\nYou will receive SMS confirmation shortly.`);
            // Reset everything
            document.getElementById('bookingForm').reset();
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step1').classList.add('active');
            document.getElementById('saveStatus').textContent = '';
        }
        
        // Initialize
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            updateFare();
        };
    </script>
</body>
</html>
